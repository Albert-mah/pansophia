<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学习中心 · Study Hub</title>
  <link rel="stylesheet" href="assets/style.css">
  <script src="data/model.js"></script>
  <script src="data/catalog.js"></script>
  <script src="data/words.js"></script>
  <script src="data/quizzes.js"></script>
  <script src="data/skeleton.js"></script>
  <script src="assets/common.js"></script>
  <script src="assets/quiz.js"></script>
</head>
<body>

  <header class="hero">
    <div class="wrap">
      <div class="track-switch" id="track-switch"></div>
      <h1 id="hero-title">📚 学习中心</h1>
      <p id="hero-sub">按科目分类整理 · 文档 + 交互 + 检测，方便随时复习</p>
      <div class="stats">
        <div class="stat"><b id="stat-total">0</b><span>知识点</span></div>
        <div class="stat"><b id="stat-subjects">0</b><span>涉及科目</span></div>
        <div class="stat"><b id="stat-updated">—</b><span>最近更新</span></div>
      </div>
    </div>
  </header>

  <div class="searchbar">
    <span class="icon">🔍</span>
    <input id="search" type="text" placeholder="搜索知识点、标签、科目…（例如：过去式 / 比较级 / 函数）" autocomplete="off">
  </div>

  <main class="wrap">

    <div id="dashboard"></div>

    <h2 class="section-title">🗂️ 按科目浏览 <span style="font-weight:400;color:var(--text-faint);font-size:.85rem">（点击可筛选，再点一次取消）</span></h2>
    <div id="subject-grid" class="subject-grid"></div>

    <div id="outline"></div>

    <h2 class="section-title">🕒 最近更新</h2>
    <div id="recent" class="recent-list"></div>

    <h2 class="section-title">📖 全部知识点</h2>
    <div id="catalog"></div>

  </main>

  <footer class="site">
    多人学习空间 · 每次提问后新的知识点会自动归类到这里 · 双击 index.html 即可离线使用
  </footer>

  <script src="assets/hub.js"></script>
</body>
</html>
