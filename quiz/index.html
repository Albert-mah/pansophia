<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>检测中心 · 学习中心</title>
  <link rel="stylesheet" href="../assets/style.css">
  <script src="../data/model.js"></script>
  <script src="../data/catalog.js"></script>
  <script src="../data/words.js"></script>
  <script src="../data/words.ja.js"></script>
  <script src="../data/quizzes.js"></script>
  <script src="../data/diagnostic.js"></script>
  <script src="../assets/common.js"></script>

</head>
<body>

  <div class="topbar">
    <div class="inner">
      <nav class="breadcrumb"><a id="home" href="../index.html">🏠 学习中心</a><span class="sep">›</span><span class="cur">检测中心</span></nav>
    </div>
  </div>

  <main class="page">
    <header class="page-header">
      <div class="kicker">期末突击 · 自测</div>
      <h1>📝 检测中心</h1>
      <div class="meta-row">单词检测 · 习题练习 · 错题本 / 生词本 · 成绩自动记录（数据存在本机）</div>
    </header>
    <div id="hub"></div>
  </main>

  <script>
    (function () {
      var tk = window.StudyHub ? StudyHub.resolveTrack() : "";
      if (tk) { StudyHub.rememberTrack(tk); var h = document.getElementById("home"); if (h) h.href = "../index.html?track=" + encodeURIComponent(tk); }
      QuizApp.renderIndex("#hub");
    })();
  </script>
</body>
